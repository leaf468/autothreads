name: AI Trends Reporter (KR)

on:
  workflow_dispatch:  # 수동 실행 (테스트 및 즉시 실행용)
    inputs:
      test_mode:
        description: 'Test mode (skip image generation)'
        required: false
        default: 'false'
  schedule:
    # 한국시간 09:00, 12:00, 15:00, 18:00, 21:00, 23:00
    # = UTC 00:00, 03:00, 06:00, 09:00, 12:00, 14:00
    - cron: '0 0,3,6,9,12,14 * * *'

jobs:
  collect-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (중복 체크용)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-generativeai pillow requests

      - name: Get current time (KST)
        id: time
        run: |
          echo "kst=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')" >> $GITHUB_OUTPUT
          echo "hour=$(TZ=Asia/Seoul date +'%H')" >> $GITHUB_OUTPUT
          echo "date=$(TZ=Asia/Seoul date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(TZ=Asia/Seoul date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Run AI Trends Hunter
        uses: langchain-ai/deepagents@main
        with:
          prompt: |
            AI 트렌드 리포트를 작성하세요.

            현재 시각: ${{ steps.time.outputs.kst }}
            출력 파일: reports/${{ steps.time.outputs.timestamp }}.md
            썸네일 프롬프트: thumbnail_prompt.txt

            .deepagents/skills/ai-trends-reporter/SKILL.md의 지침을 따르세요.

            중요:
            1. reports/ 폴더의 이전 파일 확인하여 중복 방지
            2. 메이저 3개 + 마이너 3개 뉴스 수집
            3. 모두 한글로 번역
            4. 출처 필수

          model: gpt-5-mini-2025-08-07
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}

          enable_memory: false
          shell_allow_list: recommended
          timeout: 30

      - name: Generate Thumbnail with Gemini Imagen 3
        if: github.event.inputs.test_mode != 'true'
        run: python scripts/generate_thumbnail.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TIMESTAMP: ${{ steps.time.outputs.timestamp }}

      - name: Generate SNS Content
        working-directory: examples/content-builder-agent
        run: |
          # 최신 마크다운 리포트를 소스로 사용하여 SNS 콘텐츠 생성
          echo "📱 Generating SNS content from latest report..."
          python scripts/generate_all_sns_content.py

      - name: Create Instagram image with text overlay
        if: github.event.inputs.test_mode != 'true'
        run: |
          LATEST_THUMBNAIL=$(ls -t reports/images/*-thumbnail.png 2>/dev/null | grep -v 'instagram' | head -1)
          LATEST_REPORT=$(ls -t reports/*.md 2>/dev/null | grep -v 'threads\|twitter' | head -1)

          if [ -f "$LATEST_THUMBNAIL" ] && [ -f "$LATEST_REPORT" ]; then
            echo "📸 Creating Instagram image with text overlay..."
            python scripts/add_text_to_thumbnail.py "$LATEST_THUMBNAIL" "$LATEST_REPORT"
          else
            echo "⚠️ Thumbnail or report not found for Instagram image creation"
          fi

      - name: Commit and push
        run: |
          git config user.name "AI Trends Bot"
          git config user.email "ai-trends-bot@users.noreply.github.com"

          # 변경사항 추가
          git add reports/ || true
          git add examples/content-builder-agent/sns_output/ || true

          # 변경사항이 있으면 커밋
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 AI 트렌드 리포트 + SNS 콘텐츠 - ${{ steps.time.outputs.kst }}"

            # 원격 변경사항 가져오기 및 리베이스
            git fetch origin main
            git rebase origin/main

            # 푸시
            git push origin main
          fi

      - name: Create GitHub Labels
        run: |
          # 라벨 생성 (이미 있으면 무시)
          DATE_LABEL=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          gh label create "ai-trends" --description "AI trends automated reports" --color "0E8A16" --force || true
          gh label create "automated" --description "Automated by GitHub Actions" --color "FBCA04" --force || true
          gh label create "$DATE_LABEL" --description "Report date" --color "BFD4F2" --force || true

          # SNS 콘텐츠용 라벨 생성
          gh label create "sns-content" --description "자동 생성된 SNS 콘텐츠" --color "0E8A16" --force || true
          gh label create "auto-generated" --description "봇이 자동으로 생성한 콘텐츠" --color "FBCA04" --force || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create AI Trends Issue
        run: |
          # 최신 보고서 찾기
          REPORT_FILE=$(ls -t reports/*.md 2>/dev/null | head -1)

          if [ -f "$REPORT_FILE" ]; then
            # 썸네일 이미지 찾기
            THUMBNAIL=$(ls -t reports/images/*-thumbnail.png 2>/dev/null | head -1)

            # 임시 파일 생성
            TEMP_BODY=$(mktemp)

            # 썸네일이 있으면 상단에 추가
            if [ -f "$THUMBNAIL" ]; then
              THUMBNAIL_URL="https://github.com/${{ github.repository }}/raw/main/$THUMBNAIL"
              echo "![AI Trends Thumbnail]($THUMBNAIL_URL)" > "$TEMP_BODY"
              echo "" >> "$TEMP_BODY"
              cat "$REPORT_FILE" >> "$TEMP_BODY"
            else
              cat "$REPORT_FILE" > "$TEMP_BODY"
            fi

            # Issue 생성
            gh issue create \
              --title "🤖 AI 트렌드 리포트 - ${{ steps.time.outputs.kst }}" \
              --body-file "$TEMP_BODY" \
              --label "ai-trends,automated,$(TZ=Asia/Seoul date +'%Y-%m-%d')"

            # 임시 파일 삭제
            rm -f "$TEMP_BODY"
          else
            echo "⚠️ No report file found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create SNS Content Issue
        run: |
          # 최신 all_platforms 파일 찾기
          ALL_PLATFORMS_FILE=$(ls -t examples/content-builder-agent/sns_output/all_platforms/*.txt 2>/dev/null | head -1)

          if [ -f "$ALL_PLATFORMS_FILE" ]; then
            echo "📱 Found SNS content file: $ALL_PLATFORMS_FILE"

            # 파일명에서 타임스탬프 추출
            FILENAME=$(basename "$ALL_PLATFORMS_FILE" .txt)

            # 임시 파일에 이슈 본문 작성
            TEMP_BODY=$(mktemp)

            echo "# SNS 콘텐츠 자동 생성" > "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "생성 시간: ${{ steps.time.outputs.kst }}" >> "$TEMP_BODY"
            echo "소스: AI 트렌드 리포트" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "---" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "## 📋 사용 방법" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "1. 아래 각 섹션의 콘텐츠를 복사" >> "$TEMP_BODY"
            echo "2. 해당 SNS 플랫폼에서 새 게시물 작성" >> "$TEMP_BODY"
            echo "3. 붙여넣기 후 게시" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "---" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            cat "$ALL_PLATFORMS_FILE" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "---" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "## 📁 파일 위치" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "- Instagram: \`examples/content-builder-agent/sns_output/instagram/${FILENAME}.md\`" >> "$TEMP_BODY"
            echo "- Twitter/X: \`examples/content-builder-agent/sns_output/twitter/${FILENAME}.md\`" >> "$TEMP_BODY"
            echo "- Threads: \`examples/content-builder-agent/sns_output/threads/${FILENAME}.md\`" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "---" >> "$TEMP_BODY"
            echo "" >> "$TEMP_BODY"
            echo "<sub>🤖 Generated by AI Trends Reporter at ${{ steps.time.outputs.kst }}</sub>" >> "$TEMP_BODY"

            # Issue 생성
            gh issue create \
              --title "📱 SNS 콘텐츠 - ${{ steps.time.outputs.kst }}" \
              --body-file "$TEMP_BODY" \
              --label "sns-content,auto-generated,ai-trends"

            # 임시 파일 삭제
            rm -f "$TEMP_BODY"
          else
            echo "⚠️ No SNS content file found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
