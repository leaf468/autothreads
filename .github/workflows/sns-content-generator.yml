name: SNS Content Generator

on:
  # 스케줄: 매일 3번 실행 (오전 9시, 오후 2시, 오후 7시 KST)
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST (00:00 UTC)
    - cron: '0 5 * * *'   # 14:00 KST (05:00 UTC)
    - cron: '0 10 * * *'  # 19:00 KST (10:00 UTC)

  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      content:
        description: '커스텀 콘텐츠 (선택사항)'
        required: false
        type: string

jobs:
  generate-sns-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get current time (KST)
        id: time
        run: |
          echo "timestamp=$(TZ=Asia/Seoul date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "date_kr=$(TZ=Asia/Seoul date +'%Y년 %m월 %d일 %H:%M')" >> $GITHUB_OUTPUT
          echo "date_en=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')" >> $GITHUB_OUTPUT

      - name: Generate SNS content
        id: generate
        working-directory: examples/content-builder-agent
        run: |
          # 커스텀 콘텐츠가 있으면 사용, 없으면 자동 생성
          if [ -n "${{ github.event.inputs.content }}" ]; then
            python scripts/generate_all_sns_content.py "${{ github.event.inputs.content }}"
          else
            python scripts/generate_all_sns_content.py
          fi

          # 생성된 파일 경로 저장
          TIMESTAMP="${{ steps.time.outputs.timestamp }}"
          echo "instagram_file=sns_output/instagram/${TIMESTAMP}.md" >> $GITHUB_OUTPUT
          echo "linkedin_file=sns_output/linkedin/${TIMESTAMP}.md" >> $GITHUB_OUTPUT
          echo "twitter_file=sns_output/twitter/${TIMESTAMP}.md" >> $GITHUB_OUTPUT
          echo "threads_file=sns_output/threads/${TIMESTAMP}.md" >> $GITHUB_OUTPUT
          echo "naver_file=sns_output/naver_blog/${TIMESTAMP}.md" >> $GITHUB_OUTPUT
          echo "facebook_file=sns_output/facebook/${TIMESTAMP}.md" >> $GITHUB_OUTPUT
          echo "all_file=sns_output/all_platforms/${TIMESTAMP}.txt" >> $GITHUB_OUTPUT

      - name: Read generated content
        id: content
        working-directory: examples/content-builder-agent
        run: |
          # 통합 파일 읽기
          ALL_CONTENT=$(cat "${{ steps.generate.outputs.all_file }}")

          # GitHub Issues에 사용할 수 있도록 heredoc으로 저장
          {
            echo 'all_content<<EOF'
            echo "$ALL_CONTENT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const timestamp = '${{ steps.time.outputs.timestamp }}';
            const dateKr = '${{ steps.time.outputs.date_kr }}';
            const dateEn = '${{ steps.time.outputs.date_en }}';

            const issueTitle = `📱 SNS 콘텐츠 생성 - ${dateEn}`;

            const issueBody = `# SNS 콘텐츠 자동 생성

            **생성 시간:** ${dateKr}
            **타임스탬프:** \`${timestamp}\`

            ---

            ## 📋 사용 방법

            1. 아래 각 섹션의 콘텐츠를 복사
            2. 해당 SNS 플랫폼에서 새 게시물 작성
            3. 붙여넣기 후 게시

            ---

            ${{ steps.content.outputs.all_content }}

            ---

            ## 📁 아티팩트

            전체 파일은 [GitHub Actions 아티팩트](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})에서 다운로드할 수 있습니다.

            ## 🏷️ 라벨

            - \`sns-content\` - 자동 생성된 SNS 콘텐츠
            - \`auto-generated\` - 봇이 자동으로 생성

            ---

            <sub>🤖 Generated by [SNS Content Generator](https://github.com/${{ github.repository }}/blob/main/.github/workflows/sns-content-generator.yml) at ${dateEn}</sub>
            `;

            // Issue 생성
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['sns-content', 'auto-generated']
            });

            console.log(`✅ Issue created: #${issue.data.number}`);
            console.log(`🔗 URL: ${issue.data.html_url}`);

      - name: Upload SNS content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sns-content-${{ steps.time.outputs.timestamp }}
          path: examples/content-builder-agent/sns_output/
          retention-days: 30

      - name: Comment on Issue with artifact link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const timestamp = '${{ steps.time.outputs.timestamp }}';

            // 가장 최근 생성된 sns-content 라벨이 있는 이슈 찾기
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sns-content',
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 1
            });

            if (issues.data.length > 0) {
              const issueNumber = issues.data[0].number;

              // 아티팩트 다운로드 링크 댓글 추가
              const comment = `## 📦 아티팩트 다운로드

              생성된 모든 파일을 다운로드하려면:

              1. [Actions 실행 페이지](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})로 이동
              2. 하단 "Artifacts" 섹션에서 \`sns-content-${timestamp}\` 다운로드

              또는 직접 링크:
              \`\`\`
              https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
              \`\`\`

              **보관 기간:** 30일
              `;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: comment
              });

              console.log(`✅ Comment added to issue #${issueNumber}`);
            }

      - name: Summary
        run: |
          echo "## ✅ SNS 콘텐츠 생성 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**생성 시간:** ${{ steps.time.outputs.date_kr }}" >> $GITHUB_STEP_SUMMARY
          echo "**타임스탬프:** \`${{ steps.time.outputs.timestamp }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 생성된 플랫폼" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Instagram" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ LinkedIn" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Twitter/X" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Threads" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 네이버 블로그" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Facebook" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 다음 단계" >> $GITHUB_STEP_SUMMARY
          echo "1. [Issues 탭](https://github.com/${{ github.repository }}/issues?q=is%3Aissue+is%3Aopen+label%3Asns-content)에서 생성된 콘텐츠 확인" >> $GITHUB_STEP_SUMMARY
          echo "2. 각 플랫폼별 콘텐츠 복사" >> $GITHUB_STEP_SUMMARY
          echo "3. SNS에 붙여넣기 및 게시" >> $GITHUB_STEP_SUMMARY
